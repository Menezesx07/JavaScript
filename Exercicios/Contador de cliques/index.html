<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assents/css/styles.css" />
    <title>Contador</title>
</head>
<body>
    <div class="container">
    <h1> Contador </h1>
    <p> Clique no Botão para alterar o valor </p>
    <div id="counter">
        <button name="subtrair" class="btn" onclick="decrement()">-</button>
        <span id="currentNumber">0</span>
        <button name="adicionar" class="btn" onclick="increment()">+</button>
    </div>
</div>
    <script src="assents/js/scripts.js"></script>
</body>
</html>
